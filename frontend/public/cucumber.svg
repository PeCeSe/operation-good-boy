<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <!-- Outer skin -->
  <circle cx="100" cy="100" r="95" fill="#4a8c3f"/>
  <!-- Inner skin rim -->
  <circle cx="100" cy="100" r="88" fill="#7bc67a"/>
  <!-- Flesh -->
  <circle cx="100" cy="100" r="82" fill="#c8e6a0"/>

  <!-- Three arc segments — radius 55 -->
  <path d="M100,100 L100,45 A55,55 0 0,1 148,128 Z" fill="#a8d878" opacity="0.7"/>
  <path d="M100,100 L148,128 A55,55 0 0,1 52,128 Z" fill="#a8d878" opacity="0.7"/>
  <path d="M100,100 L52,128 A55,55 0 0,1 100,45 Z" fill="#a8d878" opacity="0.7"/>

  <!-- Y lines -->
  <line x1="100" y1="100" x2="100" y2="45" stroke="#c8e6a0" stroke-width="3"/>
  <line x1="100" y1="100" x2="148" y2="128" stroke="#c8e6a0" stroke-width="3"/>
  <line x1="100" y1="100" x2="52" y2="128" stroke="#c8e6a0" stroke-width="3"/>

  <!-- Cluster 1 -->
  <g transform="rotate(60 100 100)">
    <ellipse cx="100" cy="55" rx="7" ry="12" fill="#e8f5c0" stroke="#a0c870" stroke-width="1.2"/>
    <ellipse cx="84" cy="63" rx="7" ry="12" fill="#e8f5c0" stroke="#a0c870" stroke-width="1.2" transform="rotate(-18 84 63)"/>
    <ellipse cx="116" cy="63" rx="7" ry="12" fill="#e8f5c0" stroke="#a0c870" stroke-width="1.2" transform="rotate(18 116 63)"/>
  </g>

  <!-- Cluster 2 -->
  <g transform="rotate(180 100 100)">
    <ellipse cx="100" cy="55" rx="7" ry="12" fill="#e8f5c0" stroke="#a0c870" stroke-width="1.2"/>
    <ellipse cx="84" cy="63" rx="7" ry="12" fill="#e8f5c0" stroke="#a0c870" stroke-width="1.2" transform="rotate(-18 84 63)"/>
    <ellipse cx="116" cy="63" rx="7" ry="12" fill="#e8f5c0" stroke="#a0c870" stroke-width="1.2" transform="rotate(18 116 63)"/>
  </g>

  <!-- Cluster 3 -->
  <g transform="rotate(300 100 100)">
    <ellipse cx="100" cy="55" rx="7" ry="12" fill="#e8f5c0" stroke="#a0c870" stroke-width="1.2"/>
    <ellipse cx="84" cy="63" rx="7" ry="12" fill="#e8f5c0" stroke="#a0c870" stroke-width="1.2" transform="rotate(-18 84 63)"/>
    <ellipse cx="116" cy="63" rx="7" ry="12" fill="#e8f5c0" stroke="#a0c870" stroke-width="1.2" transform="rotate(18 116 63)"/>
  </g>

  <!-- Highlight -->
  <ellipse cx="75" cy="65" rx="18" ry="12" fill="white" opacity="0.15" transform="rotate(-30 75 65)"/>
</svg>
