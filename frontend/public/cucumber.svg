<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <!-- Outer skin -->
  <circle cx="100" cy="100" r="95" fill="#4a8c3f"/>
  <!-- Inner skin rim -->
  <circle cx="100" cy="100" r="88" fill="#7bc67a"/>
  <!-- Flesh -->
  <circle cx="100" cy="100" r="82" fill="#c8e6a0"/>

  <!-- Three arc segments with gaps — bigger radius 42 -->
  <path d="M100,100 L100,58 A42,42 0 0,1 136,121 Z" fill="#a8d878" opacity="0.7"/>
  <path d="M100,100 L136,121 A42,42 0 0,1 64,121 Z" fill="#a8d878" opacity="0.7"/>
  <path d="M100,100 L64,121 A42,42 0 0,1 100,58 Z" fill="#a8d878" opacity="0.7"/>

  <!-- Y lines -->
  <line x1="100" y1="100" x2="100" y2="58" stroke="#c8e6a0" stroke-width="2.5"/>
  <line x1="100" y1="100" x2="136" y2="121" stroke="#c8e6a0" stroke-width="2.5"/>
  <line x1="100" y1="100" x2="64" y2="121" stroke="#c8e6a0" stroke-width="2.5"/>

  <!-- Cluster 1 - top right kile -->
  <g transform="rotate(60 100 100)">
    <ellipse cx="100" cy="68" rx="4" ry="7" fill="#e8f5c0" stroke="#a0c870" stroke-width="0.8"/>
    <ellipse cx="92" cy="72" rx="4" ry="7" fill="#e8f5c0" stroke="#a0c870" stroke-width="0.8" transform="rotate(-15 92 72)"/>
    <ellipse cx="108" cy="72" rx="4" ry="7" fill="#e8f5c0" stroke="#a0c870" stroke-width="0.8" transform="rotate(15 108 72)"/>
  </g>

  <!-- Cluster 2 - bottom kile -->
  <g transform="rotate(180 100 100)">
    <ellipse cx="100" cy="68" rx="4" ry="7" fill="#e8f5c0" stroke="#a0c870" stroke-width="0.8"/>
    <ellipse cx="92" cy="72" rx="4" ry="7" fill="#e8f5c0" stroke="#a0c870" stroke-width="0.8" transform="rotate(-15 92 72)"/>
    <ellipse cx="108" cy="72" rx="4" ry="7" fill="#e8f5c0" stroke="#a0c870" stroke-width="0.8" transform="rotate(15 108 72)"/>
  </g>

  <!-- Cluster 3 - top left kile -->
  <g transform="rotate(300 100 100)">
    <ellipse cx="100" cy="68" rx="4" ry="7" fill="#e8f5c0" stroke="#a0c870" stroke-width="0.8"/>
    <ellipse cx="92" cy="72" rx="4" ry="7" fill="#e8f5c0" stroke="#a0c870" stroke-width="0.8" transform="rotate(-15 92 72)"/>
    <ellipse cx="108" cy="72" rx="4" ry="7" fill="#e8f5c0" stroke="#a0c870" stroke-width="0.8" transform="rotate(15 108 72)"/>
  </g>

  <!-- Highlight -->
  <ellipse cx="75" cy="65" rx="18" ry="12" fill="white" opacity="0.15" transform="rotate(-30 75 65)"/>
</svg>
